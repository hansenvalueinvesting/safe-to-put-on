<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>safe to put on?</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎀%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="manifest" href="assets/manifest.json">
<meta name="theme-color" content="#f6f1e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="safe to put on?">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f6f1e8; --panel:#fffdf8; --panel-2:#f1ebde; --line:#e6dccb;
    --txt:#4c463d; --dim:#998f7f; --faint:#bcb1a0;
    --red:#bf8478; --red-bg:#f1e3dd; --amber:#bb9a5f; --amber-bg:#f1e8d4; --green:#92ab86; --green-bg:#e6ede0;
    --accent:#c994a1;
    --mono:Georgia,'Times New Roman',serif; --serif:'Fraunces',Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--txt);font-family:var(--mono);-webkit-font-smoothing:antialiased}
  body{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px 80px}
  .wrap{width:100%;max-width:680px}
  header{margin-bottom:22px}
  h1{font-family:var(--serif);font-weight:500;font-size:34px;letter-spacing:-.3px;line-height:1.05;cursor:pointer;display:inline-block;user-select:none}
  h1 .dot{color:var(--accent)}
  .sub{color:var(--dim);font-family:var(--serif);font-style:italic;font-size:14px;margin-top:8px;line-height:1.5}
  .searchbox{position:relative;margin:20px 0 8px}
  #q,#pq{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:12px;
     color:var(--txt);font-family:var(--mono);font-size:15px;padding:15px 16px 15px 44px;outline:none;transition:border-color .15s}
  #q:focus,#pq:focus{border-color:var(--accent)}
  #q::placeholder,#pq::placeholder{color:var(--faint)}
  .mag{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:15px}
  .hint{color:var(--faint);font-size:11.5px;text-align:center;margin-top:4px}
  .legend{display:flex;gap:6px;margin:16px 0 4px;flex-wrap:nowrap}
  .chip{flex:1 1 0;min-width:0;border:1px solid var(--line);border-radius:10px;padding:9px 8px;background:var(--panel);cursor:pointer;transition:.15s;user-select:none}
  .chip:hover{border-color:var(--faint)}
  .chip.off{opacity:.4}
  .chip .t{font-weight:700;font-size:10px;letter-spacing:0;text-transform:uppercase;line-height:1.15}
  .chip .c{display:block;font-size:9.5px;color:var(--dim);margin-top:3px;line-height:1.3}
  .chip.t1 .t{color:var(--red)} .chip.t2 .t{color:var(--amber)} .chip.t3 .t{color:var(--green)}
  .count{color:var(--faint);font-size:11.5px;margin:14px 2px 8px;letter-spacing:.3px}
  .card{border:1px solid var(--line);border-left-width:3px;border-radius:11px;background:var(--panel);
        padding:14px 16px;margin-bottom:10px;animation:rise .18s ease}
  @keyframes rise{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .card.t1{border-left-color:var(--red)} .card.t2{border-left-color:var(--amber)} .card.t3{border-left-color:var(--green)}
  .row1{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .nm{font-size:16px;font-weight:500}
  .badge{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .badge.t1{color:var(--red);background:var(--red-bg)}
  .badge.t2{color:var(--amber);background:var(--amber-bg)}
  .badge.t3{color:var(--green);background:var(--green-bg)}
  .prec{font-size:9.5px;font-weight:700;letter-spacing:.5px;color:var(--faint);border:1px solid var(--line);
        padding:2px 7px;border-radius:999px;margin-left:6px;text-transform:uppercase}
  .cat{color:var(--accent);font-size:11.5px;margin-top:5px;letter-spacing:.2px}
  .note{color:var(--dim);font-size:12.5px;line-height:1.55;margin-top:8px;font-family:var(--mono)}
  .alias{margin-top:9px;font-size:11px;color:var(--faint)}
  .alias b{color:var(--dim);font-weight:500}
  .src{margin-top:9px;font-size:10.5px;color:var(--faint);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .src b{color:var(--dim);font-weight:500;text-transform:uppercase;letter-spacing:.3px;font-size:9.5px}
  .src a{color:var(--accent);text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:2px 8px;transition:.15s}
  .src a:hover{border-color:var(--accent);background:rgba(201,148,161,.12)}
  mark{background:rgba(201,148,161,.22);color:#8a5563;border-radius:3px;padding:0 1px}
  .empty{text-align:center;color:var(--faint);font-size:13px;padding:40px 10px;line-height:1.6}
  .empty .big{font-size:17px;color:var(--dim);font-family:var(--serif)}
  footer{color:var(--dim);font-family:var(--serif);font-style:italic;font-size:13px;text-align:center;margin-top:auto;padding-top:26px;line-height:1.7}
  .modes{display:flex;gap:6px;margin-bottom:2px}
  .mode-btn{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--dim);
            font-family:var(--mono);font-size:12.5px;font-weight:500;padding:10px;cursor:pointer;transition:.15s}
  .mode-btn:hover{border-color:var(--faint)}
  .mode-btn.active{color:var(--txt);border-color:var(--accent);background:var(--panel-2)}
  .pcard{display:flex;gap:12px;align-items:center;border:1px solid var(--line);border-radius:11px;background:var(--panel);
         padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:.15s;animation:rise .18s ease}
  .pcard:hover{border-color:var(--faint)}
  .pcard img{width:46px;height:46px;object-fit:contain;background:#fff;border-radius:8px;flex:none}
  .pcard .pi{min-width:0}
  .pcard .pn{font-size:14px;font-weight:500;line-height:1.3}
  .pcard .pb{font-size:11px;color:var(--dim);margin-top:2px}
  .verdict{border:1px solid var(--line);border-left-width:4px;border-radius:12px;padding:15px 16px;margin-bottom:14px}
  .verdict.t1{border-left-color:var(--red);background:var(--red-bg)}
  .verdict.t2{border-left-color:var(--amber);background:var(--amber-bg)}
  .verdict.t3{border-left-color:var(--green);background:var(--green-bg)}
  .verdict .vh{font-family:var(--serif);font-size:21px;font-weight:600;letter-spacing:-.3px}
  .verdict.t1 .vh{color:var(--red)} .verdict.t2 .vh{color:var(--amber)} .verdict.t3 .vh{color:var(--green)}
  .verdict .vs{font-size:12px;color:var(--dim);margin-top:6px;line-height:1.55}
  .section-h{color:var(--faint);font-size:11px;text-transform:uppercase;letter-spacing:.4px;margin:16px 2px 8px}
  .listline{font-size:11.5px;color:var(--faint);line-height:1.8;word-break:break-word}
  .back{color:var(--accent);font-size:12px;cursor:pointer;display:inline-block;margin-bottom:10px}
  .spin{text-align:center;color:var(--dim);font-size:13px;padding:34px 10px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="title" title="Reset">🎀 safe to put on<span class="dot">?</span></h1>
    <div class="sub">See how worried to be about a skincare ingredient.</div>
  </header>

  <div class="modes">
    <button class="mode-btn active" id="modeIng">Ingredient</button>
    <button class="mode-btn" id="modeProd">Product</button>
  </div>

  <div id="ingredientMode">
    <div class="searchbox">
      <span class="mag">⌕</span>
      <input id="q" type="text" autocomplete="off" spellcheck="false" placeholder="search for ingredients or paste ingredient list..." autofocus>
    </div>

    <div class="legend" id="legend"></div>

    <div class="count" id="count"></div>
    <div id="results"></div>
  </div>

  <div id="productMode" hidden>
    <div class="searchbox">
      <span class="mag">⌕</span>
      <input id="pq" type="text" autocomplete="off" spellcheck="false" placeholder="search for a product or brand...">
    </div>
    <div id="productResults"><div class="empty"><span class="big">Find a product</span><br>Type a product or brand above — we'll check every ingredient against our database.</div></div>
  </div>

</div>

<footer>have fun stay safe i love ya snugs ❤️</footer>

<script>
let DATA=null, activeTiers=new Set([1,2,3]), started=false;
const $=s=>document.querySelector(s);

const TIERMETA={
  1:{label:'Stop / Check'},2:{label:'Worth Reducing'},3:{label:'All Clear'}
};

// Emoji for an ingredient, from its (one of 15) category.
const ING_EMOJI={
  'Drug / hormone':'💊','Toxic metal / contaminant':'☠️','Preservative':'🛡️',
  'UV filter':'☀️','Colorant / pigment':'🎨','Fragrance / allergen':'🌸',
  'Botanical / essential oil':'🌿','Antioxidant / vitamin':'🍊','Humectant':'💧',
  'Surfactant / cleanser':'🫧','Active / treatment':'✨','Emollient / oil':'🧴',
  'Emulsifier / texture':'🧪','Solvent / propellant':'💨','Hair / nail agent':'💅'
};
function ingredientEmoji(cat){ return ING_EMOJI[cat]||'🧴'; }

// Emoji for a product, by type keyword (first match wins), default 🧴.
const PROD_RULES=[
  ['sunscreen','☀️'],['spf','☀️'],['lip','💋'],['blush','🌷'],['bronzer','🤎'],['contour','🤎'],
  ['highlight','✨'],['luminiz','✨'],['mascara','👁️'],['brow','👁️'],['eyeliner','👁️'],
  ['eyeshadow','👁️'],['eye','👁️'],['foundation','💄'],['concealer','💄'],['cushion','💄'],
  ['tint','💄'],['powder','🪞'],['primer','🪄'],['mist','🌫️'],['setting spray','🌫️'],
  ['mask','🧖'],['cleans','🧼'],['wash','🧼'],['micellar','🧼'],['toner','💦'],['pad','💦'],
  ['essence','💦'],['serum','💧'],['ampoule','💧'],['exfoli','🧽'],['peeling','🧽'],
  ['hair','💇'],['conditioner','💇'],['oil','💧'],['cream','🧴'],['moisturizer','🧴'],
  ['lotion','🧴'],['emulsion','🧴'],['butter','🧴'],['balm','🧴']
];
function productEmoji(p){
  const hay=((p.category||'')+' '+(p.name||'')).toLowerCase();
  for(const [kw,em] of PROD_RULES){ if(hay.includes(kw)) return em; }
  return '🧴';
}

function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function norm(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,' ').trim()}

function hl(text,q){
  if(!q) return esc(text);
  const nq=norm(q); if(!nq) return esc(text);
  const terms=nq.split(' ').filter(Boolean);
  let out=esc(text);
  for(const t of terms){
    if(t.length<2) continue;
    const re=new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
    out=out.replace(re,'<mark>$1</mark>');
  }
  return out;
}

function matchScore(ing,q){
  const nq=norm(q);
  if(!nq) return 0;
  const name=norm(ing.name);
  const aliases=ing.aliases.map(norm);
  const cat=norm(ing.category);
  // exact name
  if(name===nq) return 100;
  if(aliases.includes(nq)) return 95;
  // startswith
  if(name.startsWith(nq)) return 80;
  if(aliases.some(a=>a.startsWith(nq))) return 75;
  // contains
  if(name.includes(nq)) return 60;
  if(aliases.some(a=>a.includes(nq))) return 55;
  if(cat.includes(nq)) return 30;
  if(norm(ing.note).includes(nq)) return 15;
  return 0;
}

function buildLegend(){
  const L=$('#legend'); L.innerHTML='';
  [1,2,3].forEach(t=>{
    const m=DATA.meta.tiers[t];
    const div=document.createElement('div');
    div.className='chip t'+t+(activeTiers.has(t)?'':' off');
    div.innerHTML=`<span class="t">${m.label}</span><span class="c">${m.meaning.split('.')[0]}.</span>`;
    div.onclick=()=>{
      if(!started){ started=true; activeTiers=new Set([t]); }
      else { activeTiers.has(t)?activeTiers.delete(t):activeTiers.add(t); }  // may become empty -> "none"
      buildLegend(); render();
    };
    L.appendChild(div);
  });
}

function card(ing,q){
  const t=ing.tier;
  const prec=ing.precautionary?`<span class="prec">precautionary</span>`:'';
  const aliasLine=ing.aliases.length?`<div class="alias"><b>also labeled:</b> ${hl(ing.aliases.join(', '),q)}</div>`:'';
  const srcLine=(ing.sources&&ing.sources.length)?`<div class="src"><b>sources:</b> ${ing.sources.map(s=>`<a href="${esc(s.url)}" target="_blank" rel="noopener noreferrer">${esc(s.label)}</a>`).join('')}</div>`:'';
  return `<div class="card t${t}">
    <div class="row1">
      <div class="nm">${ingredientEmoji(ing.category)} ${hl(ing.name,q)}${prec}</div>
      <span class="badge t${t}">${TIERMETA[t].label}</span>
    </div>
    <div class="cat">${hl(ing.category,q)}</div>
    <div class="note">${hl(ing.note,q)}</div>
    ${aliasLine}
    ${srcLine}
  </div>`;
}

function render(){
  const q=$('#q').value.trim();
  const C=$('#count'), R=$('#results');

  // Calm landing screen — nothing shown on fresh load, or once all tiers are deselected.
  if(!q && (!started || activeTiers.size===0)){
    C.textContent='';
    R.innerHTML=`<div class="empty"><span class="big">What's on the label?</span><br>
      Search one ingredient, paste a whole list, or tap a tier above to browse.</div>`;
    return;
  }

  const terms=q.split(/[,;\n]+/).map(s=>s.trim()).filter(Boolean);
  // No tier selected but a query is typed -> search across all tiers.
  let list=activeTiers.size?DATA.ingredients.filter(i=>activeTiers.has(i.tier)):DATA.ingredients.slice();
  if(terms.length){
    list=list.map(i=>({i,s:Math.max(...terms.map(t=>matchScore(i,t)))}))
             .filter(x=>x.s>0)
             .sort((a,b)=>b.s-a.s || a.i.name.localeCompare(b.i.name)).map(x=>x.i);
  }else{
    list=list.sort((a,b)=>a.tier-b.tier || a.name.localeCompare(b.name));
  }
  if(list.length===0){
    C.textContent='';
    R.innerHTML=`<div class="empty"><span class="big">No match yet.</span><br>
      Not a red flag on its own — but if it looks drug-like or claims to "brighten/whiten," be cautious.</div>`;
    return;
  }
  C.textContent=q?`${list.length} match${list.length>1?'es':''}`:`All ${list.length} — search to narrow`;
  R.innerHTML=list.map(i=>card(i,q)).join('');
}

$('#q').addEventListener('input',()=>{ started=true; render(); });

$('#title').addEventListener('click',()=>{
  $('#q').value=''; activeTiers=new Set([1,2,3]); started=false;
  switchTo('ing'); buildLegend(); render(); $('#q').focus();
});

fetch('database/ingredients.json')
  .then(r=>r.json())
  .then(d=>{ DATA=d; buildLegend(); render(); })
  .catch(()=>{
    $('#results').innerHTML=`<div class="empty"><span class="big">Couldn't load ingredients.json</span><br>
    Make sure database/ingredients.json is present and you're serving over http (GitHub Pages or a local server), not opening the file directly.</div>`;
  });

/* ---------- Product mode (local curated database) ---------- */
let PRODUCTS=[];
fetch('database/products.json').then(r=>r.json()).then(d=>{ PRODUCTS=d.products||[]; }).catch(()=>{});

function switchTo(mode){
  const ing=mode==='ing';
  $('#ingredientMode').hidden=!ing;
  $('#productMode').hidden=ing;
  $('#modeIng').classList.toggle('active',ing);
  $('#modeProd').classList.toggle('active',!ing);
  $('.sub').textContent=ing?'See how worried to be about a skincare ingredient.':'Search a product to check it.';
}
$('#modeIng').onclick=()=>switchTo('ing');
$('#modeProd').onclick=()=>{ switchTo('prod'); $('#pq').focus(); };

// Match a single ingredient token against the ingredient DB.
function bestMatch(token){
  if(!DATA) return null;
  let best=null,bs=0;
  for(const ing of DATA.ingredients){ const s=matchScore(ing,token); if(s>bs){bs=s;best=ing;} }
  return bs>=75?best:null;   // exact / alias / startswith only — avoid loose false positives
}
// Score a product's ingredient list (array of INCI strings) into tiers + unknowns.
function scoreProduct(ingredients){
  const clean=(ingredients||[]).map(t=>String(t)
      .replace(/^\s*active\s*:?/i,'')          // drop "Active:" prefix on sunscreen filters
      .replace(/\b\d+(\.\d+)?\s*%/g,' ')        // drop percentages
      .replace(/[()*\[\].]/g,' ').replace(/\s+/g,' ').trim())
    .filter(t=>t.length>1);
  const seen=new Set(), tiers={1:[],2:[],3:[]}, unknown=[];
  for(const tk of clean){
    const m=bestMatch(tk);
    if(m){ if(!seen.has(m.name)){ seen.add(m.name); tiers[m.tier].push(m); } }
    else unknown.push(tk);
  }
  return {tiers,unknown};
}

let pdebounce;
$('#pq').addEventListener('input',()=>{
  clearTimeout(pdebounce);
  const v=$('#pq').value.trim();
  if(v.length<2){ $('#productResults').innerHTML=''; return; }
  pdebounce=setTimeout(()=>searchProducts(v),120);
});

function searchProducts(qv){
  const R=$('#productResults');
  if(!PRODUCTS.length){ R.innerHTML='<div class="spin">Loading product database…</div>'; setTimeout(()=>searchProducts(qv),300); return; }
  const words=norm(qv).split(' ').filter(Boolean);
  const matches=PRODUCTS.filter(p=>{ const hay=norm((p.brand||'')+' '+(p.name||'')); return words.every(w=>hay.includes(w)); })
    .sort((a,b)=>((a.brand||'')+a.name).localeCompare((b.brand||'')+b.name)).slice(0,40);
  if (!matches.length) {
  R.innerHTML = `
    <div class="empty">
      <span class="big">Not in our database yet.</span><br>
      You can paste its label in Ingredient mode — or ask us to add it here.
      <br><br>

      <iframe
        src="https://docs.google.com/forms/d/e/1FAIpQLSef7FT_UmlljqRHclaFrgiQ7oblAIBsov9IbzG_FvKmPW-u0Q/viewform?embedded=true"
        loading="lazy">
      </iframe>
    </div>
  `;
  return;
}
  R.innerHTML=matches.map(p=>{ const i=PRODUCTS.indexOf(p);
    return `<div class="pcard" data-i="${i}"><div class="pi"><div class="pn">${productEmoji(p)} ${esc(p.name)}</div><div class="pb">${esc(p.brand||'')}${p.category?' · '+esc(p.category):''}</div></div></div>`;
  }).join('');
  [...R.querySelectorAll('.pcard')].forEach(el=>el.onclick=()=>renderProductResult(PRODUCTS[+el.dataset.i]));
}

function renderProductResult(p){
  const R=$('#productResults');
  const head=`<div class="back" id="pback">← back</div>
    <div class="pcard" style="cursor:default"><div class="pi"><div class="pn">${productEmoji(p)} ${esc(p.name||'Unnamed product')}</div><div class="pb">${esc(p.brand||'')}${p.category?' · '+esc(p.category):''}</div></div></div>`;
  const ings=p.ingredients||[];
  if(!ings.length){ R.innerHTML=head+`<div class="empty">No ingredient list stored for this product yet.</div>`; bindBack(); return; }
  const {tiers,unknown}=scoreProduct(ings);
  const worst=tiers[1].length?1:tiers[2].length?2:3;
  const vh=worst===1?'Stop / check':worst===2?'Worth a look':'Looks all clear';
  const vs=worst===1?'Contains one or more ingredients worth stopping to check.'
        :worst===2?'A few ingredients worth reducing — nothing acutely alarming.'
        :'Nothing flagged among the ingredients we recognized.';
  const recog=tiers[1].length+tiers[2].length+tiers[3].length;
  let html=head+`<div class="verdict t${worst}"><div class="vh">${vh}</div>
    <div class="vs">${vs}<br>${recog} recognized · ${unknown.length} not in our database</div></div>`;
  if(tiers[1].length){ html+=`<div class="section-h">Stop / check</div>`+tiers[1].map(i=>card(i,'')).join(''); }
  if(tiers[2].length){ html+=`<div class="section-h">Worth reducing</div>`+tiers[2].map(i=>card(i,'')).join(''); }
  if(tiers[3].length){ html+=`<div class="section-h">All clear (${tiers[3].length})</div><div class="listline">${tiers[3].map(i=>ingredientEmoji(i.category)+' '+esc(i.name)).join(' · ')}</div>`; }
  if(unknown.length){ html+=`<div class="section-h">Not in our database (${unknown.length})</div><div class="listline">${unknown.map(esc).join(' · ')}</div>`; }
  html+=`<div class="src" style="margin-top:16px"><b>full label:</b> <span class="listline">${ings.map(esc).join(', ')}</span></div>`;
  R.innerHTML=html; bindBack();
}
function bindBack(){ const b=$('#pback'); if(b) b.onclick=()=>{ const v=$('#pq').value.trim(); if(v.length>=2) searchProducts(v); else $('#productResults').innerHTML=''; }; }
</script>
</body>
</html>
